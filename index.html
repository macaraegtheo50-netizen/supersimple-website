<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Nature Login - Batad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slideshow-container">
        <div class="slide" style="background-image: url('bg1.jpg');"></div>
        <div class="slide" style="background-image: url('bg2.jpg');"></div>
        <div class="slide" style="background-image: url('bg3.jpg');"></div>
        <div class="slide" style="background-image: url('bg4.jpg');"></div>
        <div class="slide" style="background-image: url('bg5.jpg');"></div>
        
        <div class="dark-overlay"></div>
    </div>

    <main class="login-overlay">
        <div class="login-card">
            
            <div class="logo-container">
                <img src="batad_seal.png" alt="Municipality of Batad Official Seal">
            </div>

            <h1>Internal Controls for Expenditure</h1>
             
            <form>
                <div class="input-group">
                    <label for="email">User Name</label>
                    <input type="email" id="User" name="User" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
               
                
                <button type="submit">LOGIN</button>
            </form>
            
  
            <p class="signup">
    Don't have an account? 
    <a href="https://www.youtube.com/watch?v=EL8WPyUtg4Q" target="_blank">Contact Me</a>
</p>
        </div>
    </main>

</body>
</html>
